name: Windows Modern Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  debug-modern:
    runs-on: windows-2022
    # Backstop against a hung dependency build (was silently running toward the
    # 6h default). A healthy run is well under this.
    timeout-minutes: 300
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore built dependency libraries (Debug)
        id: deps-cache
        uses: actions/cache/restore@v4
        with:
          # Cache ONLY the dependency build outputs (staged libs + runtime DLLs).
          # The save step below runs BEFORE the solution build, so the per-commit
          # engine libs are never captured. Keyed on the dependency manifest; no
          # restore-keys, so a manifest ref change can't restore a stale prebuilt
          # lib that the idempotent bootstrap would then wrongly skip rebuilding.
          path: |
            Libs
            Bin
          key: hexdeps-${{ runner.os }}-debug-${{ hashFiles('build/dependencies.lock.json') }}

      - name: Configure (Debug)
        run: cmake --preset vs2022-x64-debug

      - name: Minimal Bootstrap (Debug)
        run: cmake --build --preset minimal-bootstrap-debug

      - name: Save built dependency libraries (Debug)
        # Save after bootstrap but before the solution build, so the cache holds
        # dependency artifacts only. Skipped on a hit (cache keys are immutable).
        if: steps.deps-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            Libs
            Bin
          key: hexdeps-${{ runner.os }}-debug-${{ hashFiles('build/dependencies.lock.json') }}

      # vcpkg manifest deps (gamenetworkingsockets + protobuf/openssl/abseil) are
      # consumed by the GameNetworkingSockets plugin from vcpkg_installed/. Cached
      # on the manifest hash; the first build is slow (source-built), cached after.
      - name: Restore vcpkg manifest deps
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: vcpkg_installed
          key: vcpkg-${{ runner.os }}-x64-windows-${{ hashFiles('vcpkg.json') }}

      - name: vcpkg install manifest deps
        shell: pwsh
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install `
            --x-manifest-root="$env:GITHUB_WORKSPACE" `
            --x-install-root="$env:GITHUB_WORKSPACE\vcpkg_installed" `
            --triplet x64-windows
          if ($LASTEXITCODE -ne 0) { Write-Error "vcpkg install failed ($LASTEXITCODE)"; exit 1 }

      - name: Save vcpkg manifest deps
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: vcpkg_installed
          key: vcpkg-${{ runner.os }}-x64-windows-${{ hashFiles('vcpkg.json') }}

      # Plugin PostBuildEvents copy their DLLs into Bin/x64/Debug/Plugins with a
      # plain `copy`, which fails if the directory doesn't exist yet. The
      # dependency bootstrap only creates Bin/x64/Debug/Bin (vendor DLLs), so
      # pre-create the Plugins folder here. Harmless no-op if it already exists.
      - name: Prepare plugin output directory (Debug)
        shell: pwsh
        run: New-Item -ItemType Directory -Force "$env:GITHUB_WORKSPACE\Bin\x64\Debug\Plugins" | Out-Null

      - name: Build Solution Modern (Debug)
        run: cmake --build --preset sln-build-debug-modern

      # Dependency-light unit tests (BinaryReader / PackageVerification /
      # PluginManifest / BlockingQueue). Runs after the Debug bootstrap has
      # staged Include/nlohmann - the test target includes <nlohmann/json.hpp>
      # only from that staged tree, so a missing/partial stage fails this build.
      - name: Configure unit tests (Debug)
        run: cmake --preset vs2022-x64-debug-tests

      - name: Build unit tests (Debug)
        run: cmake --build --preset tests-debug

      - name: Run unit tests (ctest)
        run: ctest --preset tests-debug

  release-modern:
    runs-on: windows-2022
    timeout-minutes: 300
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore built dependency libraries (Release)
        id: deps-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            Libs
            Bin
          key: hexdeps-${{ runner.os }}-release-${{ hashFiles('build/dependencies.lock.json') }}

      - name: Configure (Release)
        run: cmake --preset vs2022-x64-release

      - name: Minimal Bootstrap (Release)
        run: cmake --build --preset minimal-bootstrap-release

      - name: Save built dependency libraries (Release)
        if: steps.deps-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            Libs
            Bin
          key: hexdeps-${{ runner.os }}-release-${{ hashFiles('build/dependencies.lock.json') }}

      # vcpkg manifest deps (gamenetworkingsockets + protobuf/openssl/abseil) for
      # the GameNetworkingSockets plugin. Same triplet install serves both jobs.
      - name: Restore vcpkg manifest deps
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: vcpkg_installed
          key: vcpkg-${{ runner.os }}-x64-windows-${{ hashFiles('vcpkg.json') }}

      - name: vcpkg install manifest deps
        shell: pwsh
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install `
            --x-manifest-root="$env:GITHUB_WORKSPACE" `
            --x-install-root="$env:GITHUB_WORKSPACE\vcpkg_installed" `
            --triplet x64-windows
          if ($LASTEXITCODE -ne 0) { Write-Error "vcpkg install failed ($LASTEXITCODE)"; exit 1 }

      - name: Save vcpkg manifest deps
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: vcpkg_installed
          key: vcpkg-${{ runner.os }}-x64-windows-${{ hashFiles('vcpkg.json') }}

      # See the Debug job: pre-create the Plugins copy target so plugin
      # PostBuildEvents don't fail on a missing directory.
      - name: Prepare plugin output directory (Release)
        shell: pwsh
        run: New-Item -ItemType Directory -Force "$env:GITHUB_WORKSPACE\Bin\x64\Release\Plugins" | Out-Null

      - name: Build Solution Modern (Release)
        run: cmake --build --preset sln-build-release-modern
